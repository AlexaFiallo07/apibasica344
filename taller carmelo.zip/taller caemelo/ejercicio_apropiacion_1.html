<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 - Agenda de Contactos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        #app {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }
        button {
            padding: 8px 15px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #45a049;
        }
        #listaContactos {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }
        #listaContactos li {
            padding: 10px;
            margin: 10px 0;
            background-color: #f0f0f0;
            border-left: 4px solid #4CAF50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #listaContactos button {
            background-color: #f44336;
            padding: 5px 10px;
            font-size: 12px;
        }
        #listaContactos button:hover {
            background-color: #da190b;
        }
    </style>
</head>
<body>
    <div id="app">
        <h2>Agenda de Contactos</h2>
        <input type="text" id="inputNombre" placeholder="Nombre">
        <input type="text" id="inputTelefono" placeholder="Teléfono">
        <button id="btnAgregar">Agregar a la lista</button>

        <ul id="listaContactos">
        </ul>
    </div>

    <script>
        // 1. SELECCIÓN: Obtenemos las referencias a los elementos existentes
        const nombre = document.getElementById('inputNombre');
        const telefono = document.getElementById('inputTelefono');
        const botonAgregar = document.getElementById('btnAgregar');
        const lista = document.getElementById('listaContactos');

        // 2. EVENTO: Escuchamos el clic en el botón principal
        botonAgregar.addEventListener('click', function() {
            
            // Validar que no estén vacíos
            if (nombre.value === '' || telefono.value === '') return;

            // 3. CREACIÓN: Creamos el elemento de la lista (li)
            const nuevoItem = document.createElement('li');
            
            // Creamos el nodo de texto con la información
            const contenido = document.createTextNode(`${nombre.value} - ${telefono.value} `);
            
            // 4. BOTÓN ELIMINAR: Creamos el botón de borrar para este item específico
            const botonEliminar = document.createElement('button');
            botonEliminar.innerText = 'Eliminar';

            // 5. EVENTO DE ELIMINACIÓN: Usamos removeEventListener o simplemente manejamos la lógica
            botonEliminar.addEventListener('click', function() {
                nuevoItem.remove(); // Elimina el elemento li completo
            });

            // 6. ENSAMBLAJE: Unimos las piezas
            nuevoItem.appendChild(contenido);
            nuevoItem.appendChild(botonEliminar);
            
            // 7. INSERCIÓN: Lo agregamos a la lista del DOM
            lista.appendChild(nuevoItem);

            // Limpiar los campos después de agregar
            nombre.value = '';
            telefono.value = '';
        });

        // CONCEPTOS TEÓRICOS DEMOSTRADOS EN ESTE EJERCICIO:
        // - document.getElementById(): Selecciona elementos por ID
        // - document.createElement(): Crea elementos HTML dinámicamente
        // - document.createTextNode(): Crea nodos de texto
        // - addEventListener(): Añade listeners de eventos
        // - appendChild(): Añade elementos al DOM
        // - remove(): Elimina elementos del DOM
    </script>
</body>
</html>
