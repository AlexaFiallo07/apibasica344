<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3.a - Gestor de Contactos Pro con Búsqueda</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        #contenedor {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        #contenedor2 {
            border: 1px solid #2196F3;
            padding: 20px;
            border-radius: 8px;
            background-color: #e3f2fd;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 10px 0;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        input[type="text"] {
            padding: 12px;
            font-size: 14px;
            border: 2px solid #ddd;
            border-radius: 4px;
            width: 300px;
            margin: 10px 0;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 5px #2196F3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th {
            background-color: #4CAF50;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 12px;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f0f0f0;
        }
        table button {
            background-color: #f44336;
            padding: 5px 10px;
            font-size: 12px;
        }
        table button:hover {
            background-color: #da190b;
        }
        .info-busqueda {
            margin-top: 15px;
            padding: 10px;
            background-color: #fff9c4;
            border-left: 4px solid #fbc02d;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="contenedor">
        <h1>Gestor de Contactos Pro</h1>
        <button id="btnCargar">Cargar Tabla de Contactos</button>
        <div id="espacioTabla"></div> 
    </div>

    <div id="contenedor2">
        <h2>Buscador de Contactos</h2>
        <input type="text" id="buscador" placeholder="Buscar contacto por nombre...">
        <div class="info-busqueda">
            <strong>💡 Escribe en el campo para filtrar contactos en tiempo real</strong>
        </div>
        <div id="espacioTabla2"></div>
    </div>

    <script>
        // Nuestro arreglo de datos inicial
        const contactos = [
            { nombre: "Juan Pérez", tel: "555-0101" },
            { nombre: "María García", tel: "555-0102" },
            { nombre: "Carlos Ruiz", tel: "555-0103" },
            { nombre: "Ana López", tel: "555-0104" },
            { nombre: "Luis Sosa", tel: "555-0105" },
            { nombre: "Elena Sanz", tel: "555-0106" },
            { nombre: "Pedro Marmol", tel: "555-0107" },
            { nombre: "Sofía Castro", tel: "555-0108" },
            { nombre: "Diego Torres", tel: "555-0109" },
            { nombre: "Laura Vila", tel: "555-0110" }
        ];

        const btnCargar = document.getElementById('btnCargar');
        const espacioTabla = document.getElementById('espacioTabla');
        const espacioTabla2 = document.getElementById('espacioTabla2');

        // Función para crear tabla
        function crearTabla(contenedor, espacioDestino, esConsulta = false) {
            const tabla = document.createElement('table');
            tabla.border = "1";
            
            const encabezado = document.createElement('thead');
            encabezado.innerHTML = `
                <tr>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Acción</th>
                </tr>
            `;
            tabla.appendChild(encabezado);

            const cuerpo = document.createElement('tbody');

            contactos.forEach((contacto) => {
                const fila = document.createElement('tr');

                const celdaNombre = document.createElement('td');
                celdaNombre.appendChild(document.createTextNode(contacto.nombre));

                const celdaTel = document.createElement('td');
                celdaTel.appendChild(document.createTextNode(contacto.tel));

                const celdaAccion = document.createElement('td');
                const btnEliminar = document.createElement('button');
                btnEliminar.innerText = "Eliminar";
                
                btnEliminar.addEventListener('click', () => {
                    fila.remove();
                });

                celdaAccion.appendChild(btnEliminar);

                fila.appendChild(celdaNombre);
                fila.appendChild(celdaTel);
                fila.appendChild(celdaAccion);

                cuerpo.appendChild(fila);
            });

            tabla.appendChild(cuerpo);
            espacioDestino.appendChild(tabla);

            if (!esConsulta) {
                btnCargar.disabled = true;
            }
        }

        // PRIMER CONTENEDOR: Carga la tabla inicial
        btnCargar.addEventListener('click', function() {
            crearTabla(contenedor, espacioTabla, false);
        });

        // SEGUNDO CONTENEDOR: Buscador con filtrado en tiempo real
        crearTabla(contenedor2, espacioTabla2, true);

        const buscador = document.getElementById('buscador');

        // Escuchamos el evento 'input' (se dispara cada vez que el usuario escribe una letra)
        buscador.addEventListener('input', function() {
            const textoBusqueda = buscador.value.toLowerCase();
            
            // 1. SELECCIÓN MÚLTIPLE: Obtenemos todas las filas del cuerpo de la tabla
            // Usamos un selector CSS para llegar directamente a los tr del tbody
            const filas = document.querySelectorAll('#contenedor2 table tbody tr');

            // 2. RECORRIDO DE NODOS: Iteramos sobre la NodeList
            filas.forEach(fila => {
                // Obtenemos el texto de la primera celda (Nombre)
                const nombreContacto = fila.querySelector('td').innerText.toLowerCase();

                // 3. LÓGICA DE VISIBILIDAD:
                // Si el nombre incluye lo que el usuario escribió, mostramos la fila, si no, la ocultamos.
                if (nombreContacto.includes(textoBusqueda)) {
                    fila.style.display = ""; // Muestra el elemento (valor por defecto)
                } else {
                    fila.style.display = "none"; // Oculta el elemento
                }
            });

            // Mostrar estadística de búsqueda
            const filasVisibles = document.querySelectorAll('#contenedor2 table tbody tr:not([style*="display: none"])').length;
            console.log(`Búsqueda: "${textoBusqueda}" - ${filasVisibles} resultado(s)`);
        });

        // ANÁLISIS DEL EJERCICIO 3.a:
        // ============================
        // Este ejercicio añade funcionalidad de búsqueda en tiempo real:
        //
        // 1. EVENT 'input':
        //    - Se dispara cada vez que el usuario modifica el campo de texto
        //    - A diferencia de 'change', no requiere que pierda el foco
        //    - Perfecto para búsquedas y filtrados en tiempo real
        //
        // 2. querySelectorAll():
        //    - Selecciona TODOS los elementos que coincidan con un selector
        //    - Retorna una NodeList (colección estática de nodos)
        //    - Nos permite iterar sobre múltiples elementos
        //
        // 3. LÓGICA DE FILTRADO:
        //    - Convertimos el texto a minúsculas (toLowerCase())
        //    - Usamos includes() para comprobar si existe el texto en el nombre
        //    - Manipulamos la propiedad style.display para mostrar/ocultar filas
        //    - display: "" muestra el elemento con su estilo normal
        //    - display: "none" lo oculta completamente
        //
        // 4. CASOS DE USO:
        //    - Búsqueda de productos en tiendas online
        //    - Filtrado de tabla de empleados, contactos, etc.
        //    - Búsqueda en listas dinámicas
        //    - Autocompletado o sugerencias

    </script>
</body>
</html>
