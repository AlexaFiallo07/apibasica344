<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <script src="script6.js"></script>
    <style>
                /* RESET BÁSICO */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* FONDO GENERAL */
        body {
            background: linear-gradient(135deg, #cfefff, #eaf8ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* CONTENEDOR PRINCIPAL */
        div {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 25px;
            width: 320px;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 120, 200, 0.25);
        }

        /* INPUTS */
        input {
            border: 1px solid #8ecae6;
            border-radius: 8px;
            padding: 10px;
            font-size: 16px;
            outline: none;
            background-color: #f5fbff;
        }

        input:focus {
            border-color: #219ebc;
            box-shadow: 0 0 6px rgba(33, 158, 188, 0.5);
        }

        /* BOTONES */
        button {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #8ecae6, #219ebc);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            align-self: center;
            transition: all 0.2s ease;
        }

        /* EFECTOS BOTÓN */
        button:hover {
            background: linear-gradient(145deg, #219ebc, #023047);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        /* RESULTADO */
        input[readonly] {
            background-color: #e0f4ff;
            font-weight: bold;
            color: #023047;
        }

    </style>
</head>
<body>
    <h4>Calculadora</h>
    <div>
        <label for="">V1</label>
        <input type="text" id="campo1">

        <label for="">V2</label>
        <input type="text" id="campo2">

        <label for="">V3</label>
        <input type="text" id="campo3">

    </div>
    <div>
        <label for="">Resultado</label>
        <input type="text" name="" id="res">
        <div id="botonera">
            <button onclick="sumar()">+</button>
            <button onclick="restar()">-</button>
            <button onclick="multiplicar()">*</button>
            <button onclick="dividir()">/</button>
            <button onclick="potencia()">^</button>
            <button onclick="raiz()">√</button>

        </div>
        <audio id="yoshi" src="yoshi-5.mp3" preload="auto" style="display: none;" controls></audio>
    </div>
</body>
</html>
