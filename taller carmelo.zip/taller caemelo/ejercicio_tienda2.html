<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda</title>
</head>
<body>
    <div id="tarjetero"></div>
    <script>
        fetch('https://fakestoreapi.com/products')
        .then(response => response.json())
        .then(Data => {
            console.log(Data);
            Data.forEach(element =>{
                let card = document.createElement('div')
                let imagen = document.createElement('img')
                let nombre = document.createElement('h3')
                let precio = document.createElement('h4')
                let agregar = document.createElement('button')
                imagen.src = element.imagen
                nombre.textContent = element.title
                precio.textContent = element.price
                agregar.innerHTML = 'Agregar'
                agregar.style.backgroundColor='blue'

                agregar.addEventListener('click',()=>{
                    console.log(element)
                })
                
                card.setAttribute('class','tarjeta')
                card.appendChild(imagen)
                card.appendChild(nombre)
                card.appendChild(precio)
                card.appendChild(agregar)
                tarjetero.append(card)
            });
        });

                    cart.push(producto);
                }else{
                    cart.push({producto, unidades: 1});

        } 

    </script>
</body>
</html>
