<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Operaciones con Cadenas</title>
  <script src="script.js"></script>
  <style>
    .panel {
      border: 1px solid #ccc;
      padding: 15px;
      width: 420px;
      margin: auto;
      font-family: Arial;
    }
    input, button {
      width: 100%;
      margin: 6px 0;
      padding: 6px;
    }
    button {
      cursor: pointer;
    }
  </style>
</head>

<body>


  <div class="panel">
    <h3>Operaciones con Cadenas</h3>

    <input type="text" id="text1" placeholder="Ingrese la primera cadena">
    <input type="text" id="text2" placeholder="Ingrese la segunda cadena / carácter">

    <button onclick="comparar()">comparar</button>
    <button onclick="contar()">Contar</button>
    <button onclick="eliminar()">Eliminar espacios</button>
    <button onclick="insertar()">Insertar</button>


    <input type="text" id="res" placeholder="Resultado" readonly>
  </div>
</body>
</html>
