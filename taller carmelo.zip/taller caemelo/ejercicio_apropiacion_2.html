<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2 - Agenda de Contactos con Estilos</title>
</head>
<body>
    <div id="app">
        <h2>Agenda de Contactos</h2>
        <input type="text" id="inputNombre" placeholder="Nombre">
        <input type="text" id="inputTelefono" placeholder="Teléfono">
        <button id="btnAgregar">Agregar a la lista</button>

        <ul id="listaContactos">
        </ul>

        <div class="contador">
            Contactos destacados: <strong id="contadorDestacados">0</strong>
        </div>
    </div>

    <script>
        const nombre = document.getElementById('inputNombre');
        const telefono = document.getElementById('inputTelefono');
        const botonAgregar = document.getElementById('btnAgregar');
        const lista = document.getElementById('listaContactos');

        botonAgregar.addEventListener('click', function() {
            if (nombre.value === '' || telefono.value === '') return;

            // 1. CREACIÓN DEL CONTENEDOR (LI)
            const nuevoItem = document.createElement('li');
            
            // Usamos createAttribute para asignarle la clase inicial de CSS
            const claseBase = document.createAttribute('class');
            claseBase.value = 'contacto-item';
            nuevoItem.setAttributeNode(claseBase);

            // 2. CONTENIDO DE TEXTO
            const texto = document.createTextNode(`${nombre.value}: ${telefono.value}`);
            const spanTexto = document.createElement('span'); // Un span para separar el texto de los botones
            spanTexto.appendChild(texto);

            // 3. BOTÓN DE ASPECTO (El nuevo protagonista)
            const btnAspecto = document.createElement('button');
            btnAspecto.innerText = '✨ Destacar';
            
            btnAspecto.addEventListener('click', function() {
                // Alternamos la clase CSS "aspecto-destacado"
                // Si no la tiene, la pone; si la tiene, la quita.
                nuevoItem.classList.toggle('aspecto-destacado');
                actualizarContador();
            });

            // 4. BOTÓN ELIMINAR (Del ejercicio anterior)
            const btnEliminar = document.createElement('button');
            btnEliminar.innerText = 'Borrar';
            btnEliminar.addEventListener('click', () => {
                nuevoItem.remove();
                actualizarContador();
            });

            // 5. ENSAMBLAJE FINAL
            nuevoItem.appendChild(spanTexto);
            nuevoItem.appendChild(btnAspecto);
            nuevoItem.appendChild(btnEliminar);
            
            lista.appendChild(nuevoItem);

            // Limpiar campos
            nombre.value = '';
            telefono.value = '';
        });

        // Función para actualizar el contador de elementos destacados
        function actualizarContador() {
            const elementosDestacados = document.querySelectorAll('.aspecto-destacado');
            document.getElementById('contadorDestacados').innerText = elementosDestacados.length;
        }

        // ANÁLISIS DE CONCEPTOS CLAVE:
        // ================================
        // 1. createAttribute():
        //    - Crea un atributo HTML de forma independiente
        //    - Retorna un objeto Attr que se puede personalizar
        //    - Útil cuando necesitas atributos complejos
        //
        // 2. setAttributeNode():
        //    - Asigna un atributo previamente creado a un elemento
        //    - Es lo mismo que usar setAttribute() en este caso
        //    - Se usa para mantener una referencia al atributo si lo necesitas después
        //
        // 3. classList.toggle():
        //    - Alterna (toggle) una clase CSS en un elemento
        //    - Si no tiene la clase, la añade
        //    - Si tiene la clase, la quita
        //    - Es muy útil para efectos de activación/desactivación
        //
        // 4. querySelectorAll():
        //    - Selecciona TODOS los elementos que coincidan con un selector CSS
        //    - Retorna una NodeList (similar a un array)
        //    - Se usa con frecuencia para contar o iterar elementos

    </script>
</body>
</html>
